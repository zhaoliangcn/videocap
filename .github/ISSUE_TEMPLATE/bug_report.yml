name: Bug Report / Bug 报告
description: Create a report to help us improve / 创建报告帮助我们改进
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! / 感谢您花时间填写此 Bug 报告！
  - type: textarea
    id: description
    attributes:
      label: Describe the bug / 描述 Bug
      description: A clear and concise description of what the bug is. / 清晰简洁地描述 Bug。
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce / 复现步骤
      description: Steps to reproduce the behavior. / 复现行为的步骤。
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 预期行为
      description: A clear description of what you expected to happen. / 清晰描述您预期的行为。
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment / 环境信息
      description: |
        - OS: [e.g. macOS 13.6, Windows 11]
        - Node.js: [e.g. 18.0.0]
        - App Version: [e.g. 1.0.0]
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / 截图
      description: If applicable, add screenshots to help explain your problem. / 如适用，添加截图帮助解释问题。
