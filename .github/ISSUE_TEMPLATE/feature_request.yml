name: Feature Request / 功能建议
description: Suggest an idea for this project / 为项目提出建议
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! / 感谢您提出新功能建议！
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? / 您的建议是否与某个问题相关？
      description: A clear description of what the problem is. / 清晰描述该问题。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like / 描述您想要的解决方案
      description: A clear description of what you want to happen. / 清晰描述您想要发生什么。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered / 描述您考虑过的替代方案
      description: A clear description of any alternative solutions or features you've considered. / 清晰描述您考虑过的任何替代方案或功能。
  - type: textarea
    id: additional
    attributes:
      label: Additional context / 其他信息
      description: Add any other context or screenshots about the feature request here. / 在此添加关于功能建议的其他信息或截图。
